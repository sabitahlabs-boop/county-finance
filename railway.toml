# County Finance — Railway Deploy Configuration
# Uses Nixpacks (Railway native) — auto-injects all env vars at build time
# This is CRITICAL for VITE_* vars which must be baked into JS bundle

[build]
builder = "nixpacks"
buildCommand = "npm install --legacy-peer-deps && npm run build"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
